[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

[profile.default.rpc_endpoints]
monad_testnet = "${MONAD_RPC}"

[etherscan]
monad_testnet = { key = "verifytoken", url = "https://testnet.monadexplorer.com/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
